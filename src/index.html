<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>SigFront</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <!-- <link rel="manifest" href="manifest.webmanifest" /> -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />


 <script>
      if (global === undefined) {
        var global = window;
      }
    </script>
    <script>
      (function () {
        var STORAGE_KEY = 'lang';
        var DEFAULT_LANG = 'fr';

         var lang = localStorage.getItem(STORAGE_KEY) || DEFAULT_LANG;
    if (!['ar', 'fr', 'en'].includes(lang)) {
      lang = DEFAULT_LANG;
    }

        var dir = lang === 'ar' ? 'rtl' : 'ltr';

        // Appliquer immédiatement sur <html> et <body>

         document.documentElement.dir = dir;
    document.documentElement.lang = lang;

        // Ajouter classe pour le thème
         document.body
      ? applyClass()
      : document.addEventListener('DOMContentLoaded', applyClass);

    function applyClass() {
      document.body.dir = dir;
      document.body.classList.add(dir);
    }
      })();
    </script>


  </head>
  <body >
    <app-root></app-root>
  </body>
</html>

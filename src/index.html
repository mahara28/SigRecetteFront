<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>SigFront</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <!-- <link rel="manifest" href="manifest.webmanifest" /> -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />


 <script>
      if (global === undefined) {
        var global = window;
      }
    </script>
    <script>
      (function() {
        console.log('🔧 Script de langue exécuté');

        var STORAGE_KEY = 'lang';
        var DEFAULT_LANG = 'fr';

        // Vérifier si localStorage est disponible
        try {
          var storedLang = localStorage.getItem(STORAGE_KEY);
          console.log('  - Langue stockée:', storedLang);

          var lang = storedLang || DEFAULT_LANG;

          // Valider la langue
          if (!['ar', 'fr', 'en'].includes(lang)) {
            console.log('  - Langue invalide, utilisation du défaut');
            lang = DEFAULT_LANG;
          }

          var dir = lang === 'ar' ? 'rtl' : 'ltr';

          console.log(`  - Application: ${lang} (${dir})`);

          // Appliquer immédiatement sur <html>
          document.documentElement.dir = dir;
          document.documentElement.lang = lang;

          // Fonction pour appliquer au body quand il sera disponible
          function applyToBody() {
            if (document.body) {
              document.body.dir = dir;
              document.body.classList.remove('rtl', 'ltr');
              document.body.classList.add(dir);
              console.log('  ✓ Appliqué au body');
            } else {
              setTimeout(applyToBody, 10);
            }
          }

          applyToBody();

        } catch (e) {
          console.error('Erreur localStorage:', e);
          // Fallback
          document.documentElement.dir = 'ltr';
          document.documentElement.lang = DEFAULT_LANG;
        }
      })();
    </script>


  </head>
  <body >
    <app-root></app-root>
  </body>
</html>

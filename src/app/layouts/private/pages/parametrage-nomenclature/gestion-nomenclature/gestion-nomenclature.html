<div class="cp5" fxLayout="row wrap">
  <div fxFlex="100" fxFlex.lt-md="100">
    <mc-filter-liste-nomenclature (selectNomenclature)="onSelectNomenclature($event)">
    </mc-filter-liste-nomenclature>
  </div>

  <div fxFlex="100" fxFlex.lt-md="100">
    <mc-datatable
      [responsePayload]="params.nomenclatureData.payload"
      [responsePayloadall]="params.nomenclatureData.payloadall"
      [metadata]="params.nomenclatureData.metadata"
      (onAction)="onAction(this, $event)"
      (paginate)="onPaginateNomenclature($event)"
      (sort)="onSortNomenclatures($event)"
    >
    </mc-datatable>
  </div>
</div>

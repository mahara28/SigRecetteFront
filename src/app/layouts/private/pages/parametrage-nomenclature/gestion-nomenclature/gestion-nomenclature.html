



<div class="page-container">


  <!-- Filtre -->
   <div fxFlex="100" fxFlex.lt-md="100">
    <mc-filter-liste-nomenclature (searchoptions)="onSearch($event)"
                                  #filtre (keyup.enter)="$event.key === 'Enter' ? filtre.onSearch(): null">
    </mc-filter-liste-nomenclature>
  </div>

    
    <mc-datatable
      [responsePayload]="params.paramNomenclature.payload"
      [responsePayloadall]="params.paramNomenclature.payloadall"
      [metadata]="params.paramNomenclature.metadata"
      (onAction)="onAction(this, $event)"
      (paginate)="onPaginateParamNomenclature($event)"
      (sort)="onSortParamNomenclature($event)"
    >
    </mc-datatable>
  </div>

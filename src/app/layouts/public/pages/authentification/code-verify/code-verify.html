<main class="auth-creative-wrapper">
  <div class="auth-creative-inner">
    <div class="creative-card-wrapper">
      <div class="card my-4 overflow-hidden" style="z-index: 1">
        <div class="row flex-1 g-0">
          <div class="col-lg-6 h-100 my-auto">
            <div
              class="wd-50 bg-white p-2 rounded-circle shadow-lg position-absolute translate-middle top-50 start-50"
            >
              <img src="assets/images/logo.png" alt="" class="img-fluid" />
            </div>
            <div class="creative-card-body card-body p-sm-5">
              <h2 class="fs-20 fw-bolder mb-4">
                {{ 'verify_code.titre' | translate }}
                <!-- <a href="javascript:void(0);" class="float-end fs-12 text-primary">Change Methord</a> -->
              </h2>
              <h4 class="fs-13 fw-bold mb-2">
                {{ 'verify_code.sousTitre' | translate }}
              </h4>
              <p class="fs-12 fw-medium text-muted">
                <span>{{ 'verify_code.notification' | translate }}</span>
              </p>
              <form class="w-100 mt-4 pt-2" [formGroup]="form" (ngSubmit)="sendcode()">
                <div
                  id="otp"
                  class="inputs d-flex flex-row justify-content-center mt-2"
                  formArrayName="otp"
                >
                  <input
                    *ngFor="let ctrl of otpControls.controls; let i = index"
                    class="m-2 text-center form-control rounded otp-input"
                    type="text"
                    maxlength="1"
                    [formControlName]="i"
                    (input)="onOtpInput($event, i)"
                    (keydown)="onOtpKeyDown($event, i)"
                    (paste)="onOtpPaste($event)"
                  />
                </div>

                <div
                  class="text-danger text-center mt-2"
                  *ngIf="otpControls.invalid && (otpControls.touched || submitted)"
                >
                  {{ 'verify_code.code_invalid' | translate }}
                </div>

                <div class="mt-5">
                  <button type="submit" class="btn btn-lg btn-primary w-100">
                    {{ 'verify_code.send' | translate }}
                  </button>
                </div>

                <div class="mt-5 text-muted">
                  <span>{{ 'verify_code.non_recu' | translate }} </span>
                  <a href="javascript:void(0);" (click)="resendCode()">
                    {{ 'verify_code.resend' | translate }} (1/3)
                  </a>
                </div>
              </form>
            </div>
          </div>
          <div class="col-lg-6 bg-primary">
            <div class="h-100 d-flex align-items-center justify-content-center">
              <img src="assets/images/auth/auth-user.png" alt="" class="img-fluid" />
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<mat-sidenav-container #sidebarContainer class="mat-sidenav-container">
  <!-- ===== SIDEBAR ===== -->
  <mat-sidenav
    #sidebar
    [mode]="mode"
    [opened]="!isSmallScreen"
    [style.width]="sidebarWidth"
    [ngClass]="isSmallScreen ? 'bg-color' : 'bg-transparent'"
    class="no-print"
  >
    <nav class="nxl-navigation">
      <div class="navbar-wrapper">
        <!-- Logo -->
        <div class="m-header">
          <a class="b-brand" routerLink="/">
            @if (isSidebarExpanded || isSidebarShowing) {
              <img src="assets/images/logo.png" height="33px" alt="logo" class="logo logo-lg" />
            } @else {
              <img src="assets/images/logo.png" alt="logo" class="logo logo-sm" />
            }
          </a>
        </div>

        <!-- Menus -->
        <div class="navbar-content">
          <app-spinner-container [isLoading]="onLoadingMenu" wrapperBackground="transparent">
            @if (!listMenus.length) {
              <p class="nxl-empty-menu">Liste des menus est actuellement vide !</p>
            } @else {
              <ul class="nxl-navbar">
                @if (!isSmallScreen) {
                  @if (CONFIG.PRIVATE_LAYOUT.sidebar.compact_menu || isSidebarExpanded) {
                    <ng-container *ngTemplateOutlet="menuFixeTemp"></ng-container>
                  } @else {
                    <ng-container *ngTemplateOutlet="menuFlottantTemp"></ng-container>
                  }
                } @else {
                  <ng-container *ngTemplateOutlet="menuFixeTemp"></ng-container>
                }
              </ul>
            }
          </app-spinner-container>
        </div>
      </div>
    </nav>
  </mat-sidenav>

  <!-- ===== CONTENU PRINCIPAL ===== -->
  <mat-sidenav-content class="mat-sidenav-content-wrapper">
    <ng-content></ng-content>
  </mat-sidenav-content>
</mat-sidenav-container>

<!-- ===== Templates ===== -->
<ng-template #menuFixeTemp>
  <app-flat-menu-list
    [listMenus]="listMenus"
    [isSidebarExpanded]="isSidebarExpanded"
    [isSidebarShowing]="isSidebarShowing"
  ></app-flat-menu-list>
</ng-template>

<ng-template #menuFlottantTemp>
  <app-flot-menu-list
    [listMenus]="listMenus"
    [isSidebarExpanded]="isSidebarExpanded"
    [isSidebarShowing]="isSidebarShowing"
  ></app-flot-menu-list>
</ng-template>

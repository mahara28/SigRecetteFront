<div class="profile-header">
    <div class="cover" [ngStyle]="coverStyle()"></div>

    <img [src]="avatar()" 
         class="picture responsive-picture" 
         [alt]="fullName()"/>

    <div class="profile-header-content responsive-content">
        <div>
            <div class="full-name pr-clr">{{ fullName() }}</div>
            
            <div class="action-bar">
                <ng-content select="[action-bar]"></ng-content>
            </div>
        </div>
    </div>
</div>

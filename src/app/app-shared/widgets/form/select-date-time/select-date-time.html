<mat-form-field appearance="outline">

  <mat-label>{{ label | translate }}</mat-label>

  <input
    matInput
    [ngxMatDatetimePicker]="picker"
    [formControl]="control"
    [min]="minDate"
    [max]="maxDate"
    [disabled]="disabled"
    [matTooltipDisabled]="!hasTooltip"
    [matTooltip]="hasTooltip && control?.value != undefined
      ? getFormattedDateValueForTheTooltip(control?.value)
      : (label | translate)"
    (click)="picker.open()"
    (ngxMatDatetimePickerChange)="dateChange($event)"
  />

  <ngx-mat-datepicker-toggle matSuffix [for]="picker"></ngx-mat-datepicker-toggle>

  <ngx-mat-datetime-picker
    #picker
    [showSpinners]="showSpinners"
    [showSeconds]="showSeconds"
    [stepHour]="stepHour"
    [stepMinute]="stepMinute"
    [stepSecond]="stepSecond"
    [touchUi]="touchUi"
    [color]="color"
    [enableMeridian]="enableMeridian"
    [defaultTime]="[0, 0, 0]"
    (closed)="chooseDate()"
  >
  </ngx-mat-datetime-picker>

  <mat-error [control]="control" appControlError></mat-error>

</mat-form-field>

<mat-form-field appearance="outline" class="full-width">
  <mat-label>{{ label | translate }}</mat-label>

  <input
    matInput
    [matDatepicker]="picker"
    [formControl]="control"
    [min]="minDate"
    [max]="maxDate"
    [matTooltipDisabled]="!hasTooltip"
    [matTooltip]="
      hasTooltip && control.value
        ? getFormattedDateValueForTheTooltip(control.value)
        : (label | translate)
    "
  />
  <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
  <mat-datepicker
    #picker
    (closed)="chooseDate()"
  ></mat-datepicker>
  <mat-error *ngIf="control.invalid">
    {{ "form.error" | translate }}
  </mat-error>
</mat-form-field>

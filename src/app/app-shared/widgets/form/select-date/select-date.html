<mat-form-field appearance="outline" [hideRequiredMarker]="hideRequiredMarker">

  @if (label) {
    <mat-label>{{ label | translate }}</mat-label>
  }

  <input
    matInput
    [formControl]="control"
    [matDatepicker]="datePicker"
    [matTooltipDisabled]="!hasTooltip"
    [matTooltip]="hasTooltip && control?.value != undefined
      ? (control?.value | df)
      : (label | translate)"
    [max]="max"
    [min]="min"
    (dateChange)="chooseDate($event)"
    (click)="datePicker.open()"
  />

  <mat-datepicker-toggle
    matSuffix
    [for]="datePicker"
    (click)="datePicker.open()">
  </mat-datepicker-toggle>

  <mat-datepicker #datePicker></mat-datepicker>

  @if (hint) {
    <mat-hint>MM/DD/YYYY – MM/DD/YYYY</mat-hint>
  }

  <mat-error [control]="control" appControlError></mat-error>

</mat-form-field>

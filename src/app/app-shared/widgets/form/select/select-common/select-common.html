<mat-form-field
  appearance="outline"
  class="select-common-field"
  [attr.data-cy]="'select-' + (metadata.label ?? '')">

  <!-- LABEL -->
  <mat-label *ngIf="metadata.label">
    {{ metadata.label | translate }}
    <span
      *ngIf="hasRequiredField(control)"
      class="required-indicator"
      aria-label="required">
      *
    </span>
  </mat-label>

  <!-- HINT TEXT -->
  <mat-hint *ngIf="hint">{{ hint }}</mat-hint>

  <!-- SELECT PRINCIPAL -->
 <mat-select
  #select
  [formControl]="control"
  [multiple]="metadata.multiple ?? false"

  (openedChange)="onSelectToggle($event)"
  (selectionChange)="changeValue($event.value)"
  [attr.aria-label]="metadata.label"
  class="select-common-input">

    <!-- CAS 1: AVEC FILTRAGE -->
    <mat-select-trigger *ngIf="metadata.filter">
      <input
        #matSelectFilter
        type="text"
        matInput
        class="filter-input"
        placeholder="Rechercher..."
        (keyup)="filter($event.target.value)"
        [attr.aria-label]="'Filtrer ' + (metadata.label ?? '')">
    </mat-select-trigger>

    <!-- CAS 2: REGROUPEMENT / HIÉRARCHIE -->
    <ng-container *ngIf="metadata.grouping || metadata.parentChild">
      <mat-optgroup *ngFor="let group of listsearch" [label]="getOptionLabel(group)">
        <mat-option
          *ngFor="let child of group.children ?? []"
          [value]="getValue(child)"
          [disabled]="child.disabled ?? false"
          (onSelectionChange)="setControlsValues(child)"
          [attr.data-value]="getValue(child)"
          class="select-option">
          {{ getOptionLabel(child) }}
        </mat-option>
      </mat-optgroup>
    </ng-container>

    <!-- CAS 3: SANS REGROUPEMENT (Liste plate) -->
<ng-container *ngIf="!(metadata.grouping || metadata.parentChild)">
  <mat-option
    *ngFor="let item of listsearch.filter(i => isShowOption(i))"
    [value]="getValue(item)"
    [disabled]="item.disabled ?? false"
    (onSelectionChange)="setControlsValues(item)"
    [attr.data-value]="getValue(item)"
    class="select-option">
    {{ getOptionLabel(item) }}
  </mat-option>
</ng-container>

  </mat-select>

  <!-- TOOLTIP -->
  <span
    *ngIf="!isEmptyValue(control.value)"
    [matTooltip]="tooltipTxt"
    matTooltipPosition="above"
    class="tooltip-text">
    {{ tooltipTxt }}
  </span>

  <!-- CLEAR BUTTON -->
  <button
    *ngIf="!isEmptyValue(control.value) && !control.disabled"
    mat-icon-button
    matSuffix
    (click)="clear($event)"
    type="button"
    [attr.aria-label]="'Effacer ' + (metadata.label ?? '')"
    class="clear-button">
    <mat-icon>close</mat-icon>
  </button>

  <!-- ERROR MESSAGE -->
  <mat-error *ngIf="control.invalid && (control.dirty || control.touched)" class="error-message">
    <span *ngIf="control.hasError('required')">
      {{ metadata.label | translate }} est requis
    </span>
    <span *ngIf="control.hasError('pattern')">
      {{ metadata.label | translate }} a un format invalide
    </span>
  </mat-error>

</mat-form-field>
